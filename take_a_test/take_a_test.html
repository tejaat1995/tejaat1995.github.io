    <!-- Analytic Section Start's -->
    <section id="analytic" class="analytic-section container py-5">
        <div class="row">
            <div class="col-12">
                <h5 style="color:#406CD4" class="text-center">English 2020 midterm test</h5>

                <p><b>1. </b>What is the correct answer choose one?</p>
                <form class="text-right">
                    <div class="option">
                        <input type="checkbox" class="btn-check" id="option-1" autocomplete="off">
                        <label class="btn btn-block text-left p-3 pl-4 border rounded" for="option-1">
                            Cat have 3 legs
                        </label><br>
                    </div>
                    <div class="option">
                        <input type="checkbox" class="btn-check" id="option-2" autocomplete="off">
                        <label class="btn btn-block bg-info text-white text-left p-3 pl-4 border-0 rounded"
                            for="option-2">
                            Cat have 4 legs
                        </label><br>
                    </div>
                    <div class="option">
                        <input type="checkbox" class="btn-check" id="option-2" autocomplete="off">
                        <label class="btn btn-block text-left p-3 pl-4 border rounded" for="option-2">Cat have 2
                            legs</label><br>
                    </div>
                    <div class="option">
                        <input type="checkbox" class="btn-check" id="option-2" autocomplete="off">
                        <label class="btn btn-block text-left p-3 pl-4 border rounded" for="option-2">Cat have 7
                            legs</label><br>
                    </div>
                    <button type="submit" class="btn btn-info px-5 m">Next</button>
                </form>
            </div>
        </div>
    </section>
    <!-- Analytic Section End's -->
