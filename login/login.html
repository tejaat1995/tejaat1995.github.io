<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css" integrity="sha384-r4NyP46KrjDleawBgD5tp8Y7UzmLA05oM1iAEQ17CSuDqnUK2+k9luXQOfXJCJ4I" crossorigin="anonymous">

    <!-- Styles -->
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/custom_theme.css" />
    <link rel="stylesheet" href="../styles/utils.css" />

    <!-- Scripts -->
    <script src="https://unpkg.com/ionicons@5.1.2/dist/ionicons.js"></script>
    <title>Login</title>
  </head>
  <body>
    <div class="container-fluid bg-white h-100">
      <div class="row h-100 justify-content-center align-items-center">
        <div class="col-sm-12 col-md-6 col-lg-4">
          <div class="card border-0">
            <div class="card-body">
              <h5 class="card-title font-weight-bold">Welcome to sign in</h5>
              <button type="submit" class="btn btn-orange btn-block btn-lg mt-4 font-size-14">
                <img src="../images/logos/google_sign_in.svg" class="float-left" style="margin-top:2px"> Sign in with Google
              </button>
              <div class="row align-items-center mt-4">
                <div class="col-5 border-bottom"></div>
                <div class="col-2">
                  <p class="m-0 text-center">or</p>
                </div>
                <div class="col-5 border-bottom"></div>
              </div>
              <form class="mt-3" action="../dashboard/dashboard.html">
                <label for="email" class="form-label">Email address</label>
                <div class="input-group mb-3">
                  <span class="input-group-text bg-white" id="basic-addon1">
                    <ion-icon name="mail-outline" class="font-size-20"></ion-icon>
                  </span>
                  <input type="email" class="form-control border-left-0" id="email">
                </div>
                <div class="clearfix">
                  <!-- <label for="password" class="form-label float-left">Password</label> -->
                  <button type="button" class="btn float-left pl-0">Password</button>
                  <button type="button" class="btn btn-link text-orange float-right pr-0" style="text-decoration: none;">Forgot Password?</button>
                </div>
                <div class="input-group mb-3">
                  <span class="input-group-text bg-white" id="basic-addon1">
                    <ion-icon name="lock-closed-outline" class="font-size-20"></ion-icon>
                  </span>
                  <input type="password" class="form-control border-right-0 border-left-0" id="password">
                  <span class="input-group-text bg-white" id="basic-addon1">
                    <ion-icon name="eye-off-outline" class="font-size-20 text-muted"></ion-icon>
                  </span>
                </div>
                <button type="submit" class="btn btn-orange btn-block btn-lg mt-4 font-size-14">Login</button>
                <p class="text-center mt-3">Not a member? <a class="text-orange" href="../register/register.html" style="text-decoration: none;">Sign up now!</a></p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Optional JavaScript -->
    <!-- Popper.js first, then Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/js/bootstrap.min.js" integrity="sha384-oesi62hOLfzrys4LxRF63OJCXdXDipiYWBnvTl9Y9/TRlw5xlKIEHpNyvvDShgf/" crossorigin="anonymous"></script>
  </body>
</html>
